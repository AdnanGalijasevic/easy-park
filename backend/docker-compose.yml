services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: easypark-sqlserver
    environment:
      - ACCEPT_EULA=Y
      - SA_PASSWORD=${_saPassword:-QWEasd123!}
      - MSSQL_PID=Developer
    ports:
      - "1433:1433"
    volumes:
      - sqlserver_data:/var/opt/mssql
    networks:
      - easypark-network

  rabbitmq:
    image: rabbitmq:4.0-management
    container_name: easypark-rabbitmq
    hostname: "rabbitmq"
    restart: unless-stopped
    environment:
      - RABBITMQ_DEFAULT_USER=${_rabbitMqUser:-guest}
      - RABBITMQ_DEFAULT_PASS=${_rabbitMqPassword:-guest}
    ports:
      - "15672:15672"
      - "5672:5672"
    expose:
      - 5672
      - 15672
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:15672"]
      interval: 30s
      timeout: 10s
      retries: 10
    networks:
      - easypark-network

  easypark-api:
    restart: unless-stopped
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      - _connectionString=Server=${_source:-sqlserver},1433;Initial Catalog=${_catalog:-220016};User ID=sa;Password=${_saPassword:-QWEasd123!};TrustServerCertificate=True
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:8080
      - _corsOrigins=${_corsOrigins:-http://localhost:3000,http://127.0.0.1:3000,http://localhost:3001,http://127.0.0.1:3001,http://localhost:3020,http://127.0.0.1:3020,http://localhost:3021,http://127.0.0.1:3021,http://localhost:4200,http://127.0.0.1:4200,http://localhost:8081,http://127.0.0.1:8081}
      - _rabbitMqHost=${_rabbitMqHost:-rabbitmq}
      - _rabbitMqUser=${_rabbitMqUser:-guest}
      - _rabbitMqPassword=${_rabbitMqPassword:-guest}
      - _rabbitMqPort=${_rabbitMqPort:-5672}
      - _stripe=${_stripe:?Stripe secret key is required}
      - _stripePublishableKey=${_stripePublishableKey:-}
      - _jwtKey=${_jwtKey:-dev_jwt_key_change_me_please_32_chars_min}
      - _jwtIssuer=${_jwtIssuer:-easypark-api}
      - _jwtAudience=${_jwtAudience:-easypark-clients}
    ports:
      - "8080:8080"
    networks:
      - easypark-network
    depends_on:
      - sqlserver
      - rabbitmq

  easypark-subscriber:
    restart: on-failure
    build:
      context: .
      dockerfile: EasyPark.Subscriber/Dockerfile
    environment:
      - _rabbitMqHost=${_rabbitMqHost:-rabbitmq}
      - _rabbitMqUser=${_rabbitMqUser:-guest}
      - _rabbitMqPassword=${_rabbitMqPassword:-guest}
      - _rabbitMqPort=${_rabbitMqPort:-5672}
      - _fromAddress=${_fromAddress:-}
      - _password=${_password:-}
      - _host=${_host:-smtp.gmail.com}
      - _enableSSL=${_enableSSL:-true}
      - _displayName=${_displayName:-EasyPark}
      - _timeout=${_timeout:-255}
      - _port=${_port:-465}
    networks:
      - easypark-network
    depends_on:
      - rabbitmq

volumes:
  sqlserver_data:

networks:
  easypark-network:
    driver: bridge
