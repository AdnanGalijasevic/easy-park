name: easypark_desktop
description: "EasyPark Desktop Admin Application"
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ^3.8.1

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  http: ^1.4.0
  json_annotation: ^4.9.0
  intl: ^0.19.0
  file_picker: ^10.2.0
  flutter_map: ^6.0.0
  latlong2: ^0.9.0
  geolocator: ^13.0.1
  fl_chart: ^1.0.0
  syncfusion_flutter_pdfviewer: ^30.1.41
  file_selector: ^1.0.3
  printing: ^5.14.2
  shared_preferences: ^2.5.5
  image: ^4.8.0
  pdf: ^3.12.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  json_serializable: ^6.9.5
  build_runner: ^2.5.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/

